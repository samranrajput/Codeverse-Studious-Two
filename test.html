<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codeverse Studios</title>

    <style>
      /* ==== COLOR THEME (VERCEL STYLE) ==== */
      :root {
        /* Backgrounds */
        --black: #000000;
        --carbon: #111111;
        --charcoal: #222222;

        /* Text */
        --white: #ffffff;
        --muted: #a1a1a1;
        --dim: #7e7e7e;

        /* Borders */
        --border-grey: #2e2e2e;
      }

      /* ==== GLOBAL ==== */
      body {
        background: var(--carbon);
        color: var(--white);
        font-family: "Inter", sans-serif;
        margin: 0;
      }

      /* ==== NAVBAR ==== */
      .navbar {
        background: var(--black);
        border-bottom: 1px solid var(--border-grey);
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo-area {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        height: 45px;
      }

      nav a {
        margin-right: 20px;
        color: var(--muted);
        text-decoration: none;
        transition: 0.2s ease;
      }

      nav a:hover {
        color: var(--white);
        opacity: 0.85;
      }

      /* ==== BUTTONS ==== */
      .btn-primary {
        background: var(--charcoal);
        color: var(--white);
        border: 1px solid var(--border-grey);
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .btn-primary:hover {
        background: #2c2c2c;
      }

      .big-btn {
        padding: 14px 35px;
        font-size: 1.1rem;
      }

      /* ==== HERO ==== */
      .hero {
        padding: 100px 40px;
        text-align: center;
      }

      .hero h2 {
        font-size: 3rem;
        margin-bottom: 20px;
      }

      .hero p {
        color: var(--muted);
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      /* ==== FEATURES ==== */
      .features {
        margin-top: 60px;
        display: flex;
        justify-content: center;
        gap: 25px;
        padding: 0 40px 100px;
      }

      .card {
        background: var(--charcoal);
        padding: 30px;
        width: 250px;
        border-radius: 10px;
        border: 1px solid var(--border-grey);
        transition: 0.2s;
      }

      .card:hover {
        background: #2c2c2c;
      }

      .card h3 {
        margin-top: 0;
        margin-bottom: 10px;
      }

      .card p {
        color: var(--dim);
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo-area">
        <img src="logo.png" alt="Codeverse Studios Logo" class="logo" />
        <h1>CODEVERSE <span>STUDIOS</span></h1>
      </div>

      <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">About</a>
        <button class="btn-primary">Contact</button>
      </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
      <h2>Build. Deploy. Scale.</h2>
      <p>Your gateway into next-generation development.</p>
      <button class="btn-primary big-btn">Get Started</button>
    </section>

    <!-- FEATURES -->
    <section class="features">
      <div class="card">
        <h3>Fast Deployment</h3>
        <p>Lightning-fast performance with modern tooling.</p>
      </div>

      <div class="card">
        <h3>Modern UI</h3>
        <p>Minimal, classy, and easy to customize.</p>
      </div>

      <div class="card">
        <h3>Developer Focused</h3>
        <p>Designed with simplicity and speed at the core.</p>
      </div>
    </section>

    <script>
      // Card hover lift
      document.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("mouseenter", () => {
          card.style.transform = "translateY(-4px)";
        });

        card.addEventListener("mouseleave", () => {
          card.style.transform = "translateY(0)";
        });
      });
    </script>
  </body>
</html>
